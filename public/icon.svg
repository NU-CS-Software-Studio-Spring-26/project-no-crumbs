    <rect x="-5" y="90" width="10" height="100" rx="5"/>
    <rect x="-14" y="20" width="5" height="70" rx="2.5"/>
    <rect x="-5" y="20" width="5" height="70" rx="2.5"/>
    <rect x="4" y="20" width="5" height="70" rx="2.5"/>
    <rect x="-14" y="85" width="23" height="8" rx="3"/>
  </g>

  <!-- Knife (right) -->
  <g fill="#B84A2E" transform="translate(334, 130)">
    <rect x="-5" y="90" width="10" height="100" rx="5"/>
    <path d="M-4,20 Q6,20 6,50 L4,88 L-4,88 Z" rx="2"/>
  </g>

  <!-- Steam lines -->
  <g stroke="#E8A882" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M220,170 Q213,155 220,140 Q227,125 220,110"/>
