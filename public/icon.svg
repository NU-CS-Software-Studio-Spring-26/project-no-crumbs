<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F4845F"/>
      <stop offset="100%" stop-color="#D95F3B"/>
    </radialGradient>
  </defs>

  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Fork: rotated ~35deg, tip top-right -->
  <g transform="rotate(35, 256, 256)" fill="#FFFAF4">
    <!-- handle -->
    <rect x="244" y="280" width="24" height="150" rx="12"/>
    <!-- neck -->
    <rect x="248" y="185" width="16" height="102" rx="8"/>
    <!-- tines: 3 -->
    <rect x="230" y="82" width="12" height="110" rx="6"/>
    <rect x="250" y="82" width="12" height="110" rx="6"/>
    <rect x="270" y="82" width="12" height="110" rx="6"/>
    <!-- tine base connector -->
    <rect x="230" y="185" width="52" height="14" rx="7"/>
  </g>

  <!-- Knife: rotated ~-35deg, tip top-left -->
  <g transform="rotate(-35, 256, 256)" fill="#FFFAF4">
    <!-- handle -->
    <rect x="244" y="280" width="24" height="150" rx="12"/>
    <!-- blade -->
    <path d="M244,82 Q268,82 272,140 L268,282 L244,282 Z" rx="8"/>
  </g>
</svg>
